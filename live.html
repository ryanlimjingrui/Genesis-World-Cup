<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Genesis World Cup 2026 </title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0e1a; --bg2:#111729; --panel:#161d33; --panel2:#1c2542;
  --line:#28324f; --line2:#36436b;
  --txt:#eef2ff; --muted:#94a3c4; --dim:#5d6b91;
  --gold:#f5c542; --gold2:#ffd95e;
  --green:#34d399; --greenbg:#0c3a2e;
  --red:#fb7185; --redbg:#3a1620;
  --blue:#5b8def; --pur:#a78bfa;
  --t1:#5b8def; --t2:#34d399; --t3:#f5c542;
  --radius:16px; --radius-sm:10px;
  --shadow:0 10px 40px rgba(0,0,0,.45);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:'Outfit',system-ui,sans-serif;
  background:
    radial-gradient(1200px 600px at 80% -10%, rgba(91,141,239,.10), transparent 60%),
    radial-gradient(900px 500px at -10% 100%, rgba(167,139,250,.10), transparent 55%),
    var(--bg);
  color:var(--txt);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
  line-height:1.45;
  overflow-x:hidden;
}
.wrap{max-width:560px;margin:0 auto;padding:0 16px 120px;}
h1,h2,h3{font-weight:700;letter-spacing:-.01em}
.bebas{font-family:'Bebas Neue',sans-serif;letter-spacing:.02em}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input{font-family:inherit}
.hidden{display:none !important}

/* Header */
header.topbar{
  position:sticky;top:0;z-index:50;
  background:linear-gradient(180deg, rgba(10,14,26,.96), rgba(10,14,26,.82));
  backdrop-filter:blur(14px);
  border-bottom:1px solid var(--line);
  padding:12px 16px;
}
.topbar-inner{max-width:560px;margin:0 auto;display:flex;align-items:center;gap:12px}
.logo{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:.04em;line-height:1}
.logo .y{color:var(--gold)}
.topbar .sub{font-size:11px;color:var(--muted);letter-spacing:.14em;text-transform:uppercase;margin-top:1px}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.whoami{font-size:13px;color:var(--muted);text-align:right}
.whoami b{color:var(--txt);display:block;font-size:14px}
.icon-btn{width:38px;height:38px;border-radius:11px;background:var(--panel);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:16px}
.icon-btn:active{transform:scale(.94)}

.trial-banner{
  background:repeating-linear-gradient(45deg,#3a2a00,#3a2a00 14px,#4a3500 14px,#4a3500 28px);
  color:var(--gold2);text-align:center;font-weight:700;letter-spacing:.16em;
  font-size:12px;padding:7px;text-transform:uppercase;border-bottom:1px solid #5a4400;
}

/* Nav */
nav.tabbar{
  position:fixed;bottom:0;left:0;right:0;z-index:60;
  background:linear-gradient(0deg,rgba(10,14,26,.99),rgba(10,14,26,.9));
  backdrop-filter:blur(14px);
  border-top:1px solid var(--line);
  display:flex;justify-content:space-around;padding:8px 6px env(safe-area-inset-bottom,8px);
}
nav.tabbar button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--dim);font-size:10px;font-weight:600;letter-spacing:.04em;padding:4px 0;border-radius:10px}
nav.tabbar button .ic{font-size:19px;line-height:1}
nav.tabbar button.active{color:var(--gold)}

/* Cards & generic */
.card{background:linear-gradient(180deg,var(--panel),var(--bg2));border:1px solid var(--line);border-radius:var(--radius);padding:18px;margin-top:16px;box-shadow:var(--shadow)}
.card h2{font-size:18px;margin-bottom:4px}
.section-label{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:10px}
.muted{color:var(--muted)}
.dim{color:var(--dim)}
.row{display:flex;align-items:center;gap:10px}
.between{justify-content:space-between}
.pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:3px 9px;border-radius:99px;letter-spacing:.03em}
.pill.t1{background:rgba(91,141,239,.16);color:var(--t1)}
.pill.t2{background:rgba(52,211,153,.16);color:var(--t2)}
.pill.t3{background:rgba(245,197,66,.16);color:var(--t3)}
.pill.prev{background:rgba(245,197,66,.16);color:var(--gold)}
.pill.under{background:rgba(167,139,250,.16);color:var(--pur)}
.pill.open{background:rgba(52,211,153,.16);color:var(--green)}
.pill.locked{background:rgba(148,163,196,.14);color:var(--muted)}
.pill.done{background:rgba(91,141,239,.16);color:var(--blue)}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:var(--gold);color:#1a1400;font-weight:800;padding:14px 18px;border-radius:13px;width:100%;font-size:15px;letter-spacing:.02em;transition:transform .08s,filter .15s}
.btn:active{transform:scale(.98)}
.btn:disabled{opacity:.4;filter:grayscale(.5)}
.btn.secondary{background:var(--panel2);color:var(--txt);border:1px solid var(--line2)}
.btn.danger{background:var(--redbg);color:var(--red);border:1px solid #5a2230}
.btn.small{width:auto;padding:9px 14px;font-size:13px;border-radius:10px}
.btn.ghost{background:transparent;border:1px solid var(--line2);color:var(--txt)}

.field{margin-top:12px}
.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;letter-spacing:.04em}
.input{width:100%;background:var(--bg);border:1px solid var(--line2);color:var(--txt);padding:14px;border-radius:12px;font-size:16px;outline:none}
.input:focus{border-color:var(--gold)}

/* Login */
.login-hero{min-height:78vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:30px 0}
.login-crest{font-size:60px;margin-bottom:10px;filter:drop-shadow(0 6px 18px rgba(245,197,66,.3))}
.login-title{font-family:'Bebas Neue',sans-serif;font-size:54px;line-height:.92;letter-spacing:.02em}
.login-title .y{color:var(--gold)}
.login-sub{color:var(--muted);letter-spacing:.18em;text-transform:uppercase;font-size:12px;margin-top:8px}
.login-card{width:100%;margin-top:30px}
.linkbtn{background:none;color:var(--muted);font-size:13px;text-decoration:underline;margin-top:18px}

/* Score header */
.scorebig{background:linear-gradient(135deg,#1c2542,#161d33);border:1px solid var(--line2);border-radius:20px;padding:22px;text-align:center;position:relative;overflow:hidden;margin-top:16px}
.scorebig:before{content:"";position:absolute;inset:0;background:radial-gradient(400px 200px at 50% -40%,rgba(245,197,66,.18),transparent)}
.scorebig .lbl{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);position:relative}
.scorebig .val{font-family:'Bebas Neue',sans-serif;font-size:68px;line-height:1;color:var(--gold);position:relative;text-shadow:0 4px 20px rgba(245,197,66,.25)}
.scorebig .rk{font-size:13px;color:var(--muted);position:relative;margin-top:2px}
.scorebig .rk b{color:var(--txt)}

/* Countdown */
.countdown{display:flex;gap:8px;justify-content:center;margin-top:14px;position:relative}
.cd-unit{background:rgba(0,0,0,.3);border:1px solid var(--line2);border-radius:10px;padding:7px 0;min-width:56px;text-align:center}
.cd-unit .n{font-family:'Bebas Neue',sans-serif;font-size:26px;line-height:1;color:var(--txt)}
.cd-unit .u{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--dim)}

/* Stage list */
.stage{display:flex;align-items:center;gap:13px;padding:15px;border:1px solid var(--line);border-radius:14px;background:var(--bg2);margin-top:10px;transition:border-color .15s}
.stage:active{border-color:var(--line2)}
.stage.tap{cursor:pointer}
.stage .num{width:38px;height:38px;border-radius:11px;background:var(--panel2);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--gold);flex-shrink:0}
.stage .info{flex:1;min-width:0}
.stage .info .t{font-weight:700;font-size:15px}
.stage .info .d{font-size:12px;color:var(--muted);margin-top:1px}
.stage .chev{color:var(--dim);font-size:18px}

/* Team grid / select */
.teamlist{margin-top:6px}
.team{display:flex;align-items:center;gap:12px;padding:12px 14px;border:1px solid var(--line);border-radius:12px;margin-top:8px;background:var(--bg2);transition:.12s}
.team.sel{border-color:var(--gold);background:linear-gradient(90deg,rgba(245,197,66,.10),var(--bg2))}
.team.tap{cursor:pointer}
.team .chk{width:24px;height:24px;border-radius:7px;border:2px solid var(--line2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;color:#1a1400;font-weight:900}
.team.sel .chk{background:var(--gold);border-color:var(--gold)}
.team .rk{width:30px;text-align:center;font-family:'Bebas Neue',sans-serif;font-size:17px;color:var(--dim);flex-shrink:0}
.team .nm{flex:1;font-weight:600;font-size:15px;min-width:0}
.team .meta{display:flex;gap:6px;flex-shrink:0}
.team.correct{border-color:var(--green);background:linear-gradient(90deg,var(--greenbg),var(--bg2))}
.team.wrong{border-color:#5a2230;opacity:.7}
.team .res{font-size:16px;flex-shrink:0}

.subhead{display:flex;align-items:center;justify-content:space-between;margin-top:18px;margin-bottom:4px}
.flt{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.flt button{font-size:12px;font-weight:600;padding:7px 12px;border-radius:99px;background:var(--panel2);border:1px solid var(--line);color:var(--muted)}
.flt button.on{background:var(--gold);color:#1a1400;border-color:var(--gold)}

.counter{position:sticky;bottom:74px;z-index:30;margin-top:16px}
.counter-inner{background:var(--panel2);border:1px solid var(--line2);border-radius:14px;padding:12px 16px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow)}
.counter .c{font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--gold)}
.counter .c.bad{color:var(--red)}
.counter .lbl{font-size:12px;color:var(--muted);flex:1}

/* Match (knockout) */
.match{border:1px solid var(--line);border-radius:14px;background:var(--bg2);margin-top:10px;overflow:hidden}
.match .mh{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);padding:8px 14px 0}
.mteam{display:flex;align-items:center;gap:10px;padding:13px 14px;border-bottom:1px solid var(--line);transition:.12s}
.mteam:last-child{border-bottom:none}
.mteam.tap{cursor:pointer}
.mteam.sel{background:linear-gradient(90deg,rgba(245,197,66,.12),var(--bg2))}
.mteam .dot{width:18px;height:18px;border-radius:50%;border:2px solid var(--line2);flex-shrink:0}
.mteam.sel .dot{background:var(--gold);border-color:var(--gold)}
.mteam .nm{flex:1;font-weight:600;font-size:15px}
.mteam.winner{background:linear-gradient(90deg,var(--greenbg),var(--bg2))}
.mteam.winner .nm{color:var(--green)}
.mteam.lost{opacity:.5}
.mteam .tag{font-size:11px;font-weight:700;padding:2px 8px;border-radius:99px}
.mteam.pickcorrect .tag{background:rgba(52,211,153,.18);color:var(--green)}
.mteam.pickwrong .tag{background:var(--redbg);color:var(--red)}

/* Leaderboard */
.lbrow{display:flex;align-items:center;gap:12px;padding:13px 14px;border:1px solid var(--line);border-radius:13px;background:var(--bg2);margin-top:9px}
.lbrow.me{border-color:var(--gold);background:linear-gradient(90deg,rgba(245,197,66,.08),var(--bg2))}
.lbrow .rk{width:34px;height:34px;border-radius:10px;background:var(--panel2);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:18px;flex-shrink:0}
.lbrow.r1 .rk{background:linear-gradient(135deg,#f5c542,#b8860b);color:#1a1400}
.lbrow.r2 .rk{background:linear-gradient(135deg,#cfd6e6,#8a93a8);color:#1a1400}
.lbrow.r3 .rk{background:linear-gradient(135deg,#cd9b6a,#8a5a2b);color:#1a1400}
.lbrow .nm{flex:1;font-weight:700;font-size:15px}
.lbrow .nm .tb{font-size:11px;color:var(--dim);font-weight:500}
.lbrow .recent{font-size:12px;color:var(--muted);text-align:right}
.lbrow .tot{font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--gold);min-width:48px;text-align:right}

/* Predictions page */
.predplayer{margin-top:14px}
.predplayer>.ph{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--panel2);border:1px solid var(--line2);border-radius:12px;cursor:pointer}
.predplayer .ph .nm{flex:1;font-weight:700}
.predbody{padding:4px 2px}
.predstage{margin-top:12px}
.predstage .psh{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:6px}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{font-size:12px;font-weight:600;padding:5px 10px;border-radius:99px;background:var(--bg);border:1px solid var(--line2);color:var(--txt)}
.chip.correct{background:var(--greenbg);border-color:var(--green);color:var(--green)}
.lockmsg{font-size:13px;color:var(--dim);font-style:italic;padding:6px 0}

/* Admin */
.adminsec{border:1px solid var(--line2);border-radius:14px;margin-top:14px;overflow:hidden}
.adminsec>.ah{padding:14px;background:var(--panel2);font-weight:700;display:flex;justify-content:space-between;align-items:center;cursor:pointer;font-size:15px}
.adminsec .ab{padding:14px;border-top:1px solid var(--line)}
.tinp{display:flex;gap:8px;align-items:center;margin-top:8px}
.tinp .nm{flex:1;font-size:14px}
.tinp input{width:70px;text-align:center}
.statusgrid{display:grid;grid-template-columns:1fr auto;gap:6px 12px;font-size:13px;margin-top:8px}
.statusgrid .ok{color:var(--green)}
.statusgrid .no{color:var(--red)}

.empty{text-align:center;color:var(--dim);padding:34px 10px;font-size:14px}
.spinner{width:34px;height:34px;border:3px solid var(--line2);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin:40px auto}
@keyframes spin{to{transform:rotate(360deg)}}

.toast{position:fixed;left:50%;bottom:90px;transform:translateX(-50%) translateY(20px);background:var(--green);color:#06281c;font-weight:700;padding:13px 22px;border-radius:13px;box-shadow:var(--shadow);z-index:200;opacity:0;transition:.28s;pointer-events:none;max-width:90vw;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.err{background:var(--red);color:#330911}

.modal-bg{position:fixed;inset:0;background:rgba(4,7,15,.75);backdrop-filter:blur(4px);z-index:150;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--panel);border:1px solid var(--line2);border-radius:18px;padding:22px;max-width:420px;width:100%;box-shadow:var(--shadow)}
.modal h3{font-size:18px;margin-bottom:6px}
.modal .acts{display:flex;gap:10px;margin-top:18px}

.note{font-size:12px;color:var(--dim);margin-top:8px;line-height:1.5}
.divider{height:1px;background:var(--line);margin:16px 0}
.fade-in{animation:fade .35s ease both}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.stagger>*{animation:fade .4s ease both}
.stagger>*:nth-child(1){animation-delay:.02s}
.stagger>*:nth-child(2){animation-delay:.06s}
.stagger>*:nth-child(3){animation-delay:.10s}
.stagger>*:nth-child(4){animation-delay:.14s}
.stagger>*:nth-child(5){animation-delay:.18s}
.stagger>*:nth-child(6){animation-delay:.22s}
.stagger>*:nth-child(7){animation-delay:.26s}
.stagger>*:nth-child(8){animation-delay:.30s}
</style>
</head>
<body>



<!-- LOGIN -->
<div id="loginView">
  <div class="wrap">
    <div class="login-hero fade-in">
      <div class="login-crest">🏆</div>
      <div class="login-title">GENESIS<br><span class="y">WORLD CUP</span></div>
      <div class="login-sub">2026 · Prediction League </div>
      <div class="login-card card">
        <div class="field">
          <label>Enter your name to play</label>
          <input class="input" id="nameInput" placeholder="e.g. Ryan" autocomplete="off" maxlength="24">
        </div>
        <button class="btn" id="enterBtn" style="margin-top:14px">Enter the League →</button>
        <button class="linkbtn" id="adminToggle">Organiser / Admin access</button>
        <div id="adminLogin" class="hidden">
          <div class="divider"></div>
          <div class="field">
            <label>Admin PIN</label>
            <input class="input" id="pinInput" type="tel" inputmode="numeric" placeholder="••••" maxlength="4">
          </div>
          <button class="btn secondary" id="adminEnterBtn" style="margin-top:12px">Open Admin Panel</button>
        </div>
      </div>
      <p class="note" style="text-align:center;max-width:320px">No password, no download. Your name is your profile. Same name on another device picks up where you left off.</p>
    </div>
  </div>
</div>

<!-- APP -->
<div id="appView" class="hidden">
  <header class="topbar">
    <div class="topbar-inner">
      <div>
        <div class="logo">GENESIS <span class="y">WC</span></div>
        <div class="sub">2026 League </div>
      </div>
      <div class="topbar-right">
        <div class="whoami"><span class="muted">Playing as</span><b id="waName">—</b></div>
        <button class="icon-btn" id="logoutBtn" title="Sign out">⎋</button>
      </div>
    </div>
  </header>

  <div class="wrap">
    <div id="page-home"></div>
    <div id="page-picks" class="hidden"></div>
    <div id="page-leaderboard" class="hidden"></div>
    <div id="page-predictions" class="hidden"></div>
    <div id="page-admin" class="hidden"></div>
  </div>

  <nav class="tabbar" id="tabbar">
    <button data-page="home" class="active"><span class="ic">🏠</span>Home</button>
    <button data-page="picks"><span class="ic">🎯</span>My Picks</button>
    <button data-page="leaderboard"><span class="ic">🏅</span>Ranks</button>
    <button data-page="predictions"><span class="ic">👁</span>Everyone</button>
    <button data-page="admin" id="adminTab"><span class="ic">⚙️</span>Admin</button>
  </nav>
</div>

<div id="toast" class="toast"></div>
<div id="modalRoot"></div>

function playerObj(key){ return state.players[key]||{}; }

function championPoints(p){
  if(!p.champion) return 0;
  var res = state.results; if(!res.group) return 0;
  // champion correct only known once Final winner entered
  var finalWinner = (res.ko.final && res.ko.final["0"]) || null;
  if(!finalWinner || p.champion!==finalWinner) return 0;
  var t=teamByName(p.champion);
  if(!t) return 0;
  return t.prevWinner?25:75;
}
function groupPoints(p){
  if(!p.group||!state.results.group||!state.results.group.length) return 0;
  var qualified={}; state.results.group.forEach(function(n){qualified[n]=1;});
  var pts=0;
  p.group.forEach(function(n){
    if(qualified[n]){ var t=teamByName(n); if(t) pts+=t.tierPts; }
  });
  return pts;
}
function koStagePoints(p,key){
  var stage=STAGES.filter(function(s){return s.key===key;})[0];
  var picks=(p.ko&&p.ko[key])||{};
  var res=(state.results.ko&&state.results.ko[key])||{};
  var pts=0;
  Object.keys(res).forEach(function(mi){
    if(picks[mi] && picks[mi]===res[mi]) pts+=stage.pts;
  });
  return pts;
}
function stagePoints(p,key){
  if(key==="champion") return championPoints(p);
  if(key==="group") return groupPoints(p);
  return koStagePoints(p,key);
}
function overrideFor(p,key){ return (p.override&&typeof p.override[key]==="number")?p.override[key]:0; }
function totalPoints(key){
  var p=playerObj(key); var tot=0;
  STAGES.forEach(function(s){ tot+=stagePoints(p,s.key)+overrideFor(p,s.key); });
  return tot;
}

/* Tiebreaker metrics. Higher is better for each, applied in order. */
function tiebreak(key){
  var p=playerObj(key); var res=state.results;
  var finalWinner=(res.ko.final&&res.ko.final["0"])||null;
  // 1: predicted champion (their final winner pick) correct
  var finalPick=(p.ko&&p.ko.final&&p.ko.final["0"])||null;
  var champCorrect=(finalWinner&&finalPick===finalWinner)?1:0;
  // finalists: teams in the actual Final = the two teams in bracket.final matches
  var actualFinalists=bracketTeams("final");
  var myFinalPicks=koPickTeams(p,"sf"); // SF winners they picked = their predicted finalists
  var bothFinalists = (actualFinalists.length===2 &&
        myFinalPicks.indexOf(actualFinalists[0])>=0 &&
        myFinalPicks.indexOf(actualFinalists[1])>=0)?1:0;
  // semifinalists: actual semifinalists = teams in bracket.sf
  var actualSemi=bracketTeams("sf");
  var mySemiPicks=koPickTeams(p,"qf");
  var semiCount=countIntersect(mySemiPicks,actualSemi);
  // quarterfinalists: actual QF teams = bracket.qf
  var actualQF=bracketTeams("qf");
  var myQFPicks=koPickTeams(p,"r16");
  var qfCount=countIntersect(myQFPicks,actualQF);
  return [champCorrect,bothFinalists,semiCount,qfCount];
}
function bracketTeams(key){
  var b=state.bracket[key]; if(!b||!b.matches) return [];
  var out=[]; b.matches.forEach(function(m){ if(m[0])out.push(m[0]); if(m[1])out.push(m[1]); });
  return out;
}
function koPickTeams(p,key){
  var picks=(p.ko&&p.ko[key])||{}; var out=[];
  Object.keys(picks).forEach(function(mi){ if(picks[mi]) out.push(picks[mi]); });
  return out;
}
function countIntersect(a,b){ var s={}; b.forEach(function(x){s[x]=1;}); var c=0; a.forEach(function(x){if(s[x])c++;}); return c; }

function leaderboard(){
  var rows=Object.keys(state.players).map(function(k){
    var p=state.players[k];
    return {key:k, display:p.display||k, total:totalPoints(k), tb:tiebreak(k)};
  });
  rows.sort(function(a,b){
    if(b.total!==a.total) return b.total-a.total;
    for(var i=0;i<a.tb.length;i++){ if(b.tb[i]!==a.tb[i]) return b.tb[i]-a.tb[i]; }
    return a.display.localeCompare(b.display);
  });
  // assign ranks with ties
  var rank=0,prevSig=null,seen=0;
  rows.forEach(function(r){
    seen++;
    var sig=r.total+"|"+r.tb.join(",");
    if(sig!==prevSig){ rank=seen; prevSig=sig; }
    r.rank=rank;
  });
  return rows;
}

/* ---------- COUNTDOWN (live only) ---------- */
function nextDeadlineKey(){

    var box=byId('cdBox'); if(!box){ return; }

    if(diff<0){ box.innerHTML='<div class="cd-unit"><div class="n">0</div><div class="u">Closed</div></div>'; return; }
    var d=Math.floor(diff/86400000), h=Math.floor(diff%86400000/3600000),

  var sorted=TEAMS.slice().sort(function(a,b){

    return a.name.localeCompare(b.name);
  });
  var h='<div class="flt" id="grpFilter">'
     +'<button data-f="all" class="on">All 48</button>'
     +'<button data-f="1">Tier 1 · 1pt</button>'
     +'<button data-f="2">Tier 2 · 2pt</button>'
     +'<button data-f="3">Tier 3 · 3pt</button></div>';
  h+='<div class="teamlist" id="grpList">';
  sorted.forEach(function(t){ h+=groupRow(t,locked,resultSet,hasResults); });
  h+='</div>';
  if(!locked){
    h+='<div class="counter" id="grpCounter"></div>';
    h+='<div style="margin-top:12px"><button class="btn" id="saveGroup">Save 32 Picks</button></div>';
  } else {
    h+='<p class="note">This stage is locked. Your selections are shown above'+(hasResults?', with correct qualifiers highlighted green':'')+'.</p>';
  }
  return h;
}
function groupRow(t,locked,resultSet,hasResults){
  var sel=draftGroup.indexOf(t.name)>=0;
  var cls='team'+(locked?'':' tap');
  if(hasResults){
    if(sel && resultSet[t.name]) cls='team correct';
    else if(sel && !resultSet[t.name]) cls='team wrong';
    else if(sel) cls+=' sel';
  } else if(sel) cls+=' sel';
  var res = hasResults && sel ? (resultSet[t.name]?'<span class="res">✅</span>':'<span class="res">❌</span>') : '';
  return '<div class="'+cls+'" data-team="'+esc(t.name)+'" data-tier="'+t.tier+'">'
    +'<div class="chk">'+(sel?'✓':'')+'</div>'
    +'<div class="rk">'+t.rank+'</div>'
    +'<div class="nm">'+esc(t.name)+'</div>'
    +'<div class="meta"><span class="pill t'+t.tier+'">T'+t.tier+' · '+t.tierPts+'pt</span></div>'+res+'</div>';
}
function updateGrpCounter(){
  var c=byId('grpCounter'); if(!c) return;
  var n=draftGroup.length, bad=(n!==32);
  c.innerHTML='<div class="counter-inner"><div class="c'+(bad?' bad':'')+'">'+n+'/32</div>'
    +'<div class="lbl">'+(n<32?('Select '+(32-n)+' more'):(n>32?('Remove '+(n-32)):'Ready to save'))+'</div></div>';
  var btn=byId('saveGroup'); if(btn) btn.disabled=(n!==32);
}

/* ----- KO editor ----- */
var draftKO={};
function renderKOEditor(key,locked){
  var st=STAGES.filter(function(s){return s.key===key;})[0];
  var p=playerObj(state.user);
  draftKO=JSON.parse(JSON.stringify((p.ko&&p.ko[key])||{}));
  byIdSafeDesc("Pick the winner of each match. "+st.pts+" points per correct winner.");
  var b=state.bracket[key];
  if(!b || !b.confirmed || !b.matches || !b.matches.length){
    return '<div class="empty">⏳ Next round bracket coming soon.<br><span class="dim">The admin will set the matchups once the previous round is decided.</span></div>';
  }
  var res=(state.results.ko&&state.results.ko[key])||{};
  var h='<div class="stagger">';
  b.matches.forEach(function(m,idx){
    var picked=draftKO[idx];
    var winner=res[idx]||null;
    h+='<div class="match"><div class="mh">Match '+(idx+1)+'</div>';
    [0,1].forEach(function(side){
      var team=m[side];
      if(!team){ h+='<div class="mteam"><div class="dot"></div><div class="nm dim">TBD</div></div>'; return; }
      var sel=(picked===team);
      var cls='mteam'+(locked?'':' tap');
      var tag='';
      if(winner){
        if(team===winner){ cls='mteam winner'; }
        else { cls+=' lost'; }
        if(sel && team===winner) { cls+=' pickcorrect'; tag='<span class="tag">✓ your pick</span>'; }
        else if(sel && team!==winner){ cls+=' pickwrong'; tag='<span class="tag">✗ your pick</span>'; }
      } else if(sel){ cls+=' sel'; tag='<span class="tag" style="background:rgba(245,197,66,.18);color:var(--gold)">your pick</span>'; }
      h+='<div class="'+cls+'" data-mi="'+idx+'" data-team="'+esc(team)+'">'
        +'<div class="dot"></div><div class="nm">'+esc(team)+'</div>'+tag+'</div>';
    });
    h+='</div>';
  });
  h+='</div>';
  if(!locked) h+='<div style="margin-top:16px"><button class="btn" id="saveKO" data-key="'+key+'">Save Picks</button></div>';
  else h+='<p class="note">This stage is locked. Results highlighted once entered by admin.</p>';
  return h;
}

function wireStageEditor(key,st,locked){
  if(st.kind==="champion"){
    if(!locked){
      Array.prototype.forEach.call(document.querySelectorAll('[data-champ]'),function(n){
        n.onclick=function(){ draftChampion=n.getAttribute('data-champ'); renderStageEditor(key); };
      });
      var sc=byId('saveChamp'); if(sc) sc.onclick=function(){
        if(!draftChampion){ toast('Pick a team first',true); return; }
        saveField('champion',draftChampion,'Champion pick saved!');
      };
    }
  } else if(st.kind==="group"){
    if(!locked){
      updateGrpCounter();
      Array.prototype.forEach.call(document.querySelectorAll('#grpList [data-team]'),function(n){
        n.onclick=function(){
          var tn=n.getAttribute('data-team');
          var i=draftGroup.indexOf(tn);
          if(i>=0) draftGroup.splice(i,1);
          else { if(draftGroup.length>=32){ toast('You already have 32. Deselect one first.',true); return;} draftGroup.push(tn); }
          // re-render just classes
          var sel=draftGroup.indexOf(tn)>=0;
          n.classList.toggle('sel',sel);
          n.querySelector('.chk').textContent=sel?'✓':'';
          updateGrpCounter();
        };
      });
      Array.prototype.forEach.call(document.querySelectorAll('#grpFilter button'),function(b){
        b.onclick=function(){
          groupFilter=b.getAttribute('data-f');
          Array.prototype.forEach.call(document.querySelectorAll('#grpFilter button'),function(x){x.classList.toggle('on',x===b);});
          Array.prototype.forEach.call(document.querySelectorAll('#grpList [data-team]'),function(n){
            var show=(groupFilter==="all"||n.getAttribute('data-tier')===groupFilter);
            n.style.display=show?'':'none';
          });
        };
      });
      var sg=byId('saveGroup'); if(sg) sg.onclick=function(){
        if(draftGroup.length!==32){ toast('Select exactly 32 teams',true); return; }
        saveField('group',draftGroup,'Your 32 picks are saved!');
      };
    }
  } else {
    if(!locked){
      Array.prototype.forEach.call(document.querySelectorAll('#page-picks .mteam[data-team]'),function(n){
        n.onclick=function(){
          var mi=n.getAttribute('data-mi'), tn=n.getAttribute('data-team');
          draftKO[mi]=tn;
          renderStageEditor(key);
        };
      });
      var sk=byId('saveKO'); if(sk) sk.onclick=function(){
        var b=state.bracket[key];
        if(Object.keys(draftKO).length<b.matches.length){ toast('Pick a winner for every match',true); return; }
        saveKOField(key,draftKO,'Your '+st.short+' picks are saved!');
      };
    }
  }
}

/* ---------- SAVE ---------- */
function saveField(field,val,msg){
  if(!state.user||state.isAdmin&&!state.displayName){ toast('Log in as a player to save',true); return; }
  var upd={}; upd[field]=val; upd.display=state.displayName;
  ref("players/"+state.user).update(upd).then(function(){
    toast(msg||'Saved!');
  }).catch(function(e){ toast('Save failed: '+e.message,true); });
}
function saveKOField(key,obj,msg){
  var upd={}; upd.display=state.displayName;
  ref("players/"+state.user+"/ko/"+key).set(obj).then(function(){
    ref("players/"+state.user+"/display").set(state.displayName);
    toast(msg||'Saved!');
  }).catch(function(e){ toast('Save failed: '+e.message,true); });
}

/* ---------- LEADERBOARD ---------- */
function renderLeaderboard(){
  var el=byId('page-leaderboard');
  var lb=leaderboard();
  var finalScored=!!(state.results.ko.final&&state.results.ko.final["0"]);
  var html='<div class="card fade-in"><h2>🏅 Leaderboard</h2><p class="muted" style="margin-top:4px">'+lb.length+' players · live standings</p></div>';
  if(!lb.length){ el.innerHTML=html+'<div class="empty">No players yet.</div>'; return; }
  // recent stage = most recently scored stage
  var recentKey=mostRecentScoredStage();
  html+='<div class="row between" style="margin-top:14px;padding:0 14px"><span class="section-label" style="margin:0">Player</span>'
       +'<span class="section-label" style="margin:0">Recent · Total</span></div>';
  html+='<div class="stagger">';
  lb.forEach(function(r){
    var rkCls=r.rank===1?'r1':r.rank===2?'r2':r.rank===3?'r3':'';
    var me=(r.key===state.user)?' me':'';
    var medal=r.rank===1?'🥇':r.rank===2?'🥈':r.rank===3?'🥉':r.rank;
    var p=playerObj(r.key);
    var recentTxt='—';
    if(finalScored){
      var fpts=stagePoints(p,'final')+overrideFor(p,'final');
      var cpts=championPoints(p);
      recentTxt=fpts+' + '+cpts+' <span class="dim">(final+champ)</span>';
    } else if(recentKey){
      recentTxt=(stagePoints(p,recentKey)+overrideFor(p,recentKey))+' <span class="dim">'+stShort(recentKey)+'</span>';
    }
    html+='<div class="lbrow '+rkCls+me+'"><div class="rk">'+medal+'</div>'
       +'<div class="nm">'+esc(r.display)+(me?' <span class="tb">(you)</span>':'')+'</div>'
       +'<div class="recent">'+recentTxt+'</div>'
       +'<div class="tot">'+r.total+'</div></div>';
  });
  html+='</div><p class="note">Ties broken by: correct champion, then both finalists, then most semi-finalists, then most quarter-finalists. Remaining ties share the prize.</p>';
  el.innerHTML=html;
}
function stShort(key){ var s=STAGES.filter(function(x){return x.key===key;})[0]; return s?s.short:key; }
function mostRecentScoredStage(){
  var order=["group","r32","r16","qf","sf","third","final"];
  var last=null;
  order.forEach(function(k){
    if(k==="group"){ if(state.results.group&&state.results.group.length) last=k; }
    else if(state.results.ko[k] && Object.keys(state.results.ko[k]).length) last=k;
  });
  return last;
}

/* ---------- EVERYONE'S PREDICTIONS ---------- */
var openPlayers={};
function renderPredictions(){
  var el=byId('page-predictions');
  var keys=Object.keys(state.players);
  var html='<div class="card fade-in"><h2>👁 Everyone\u2019s Predictions</h2><p class="muted" style="margin-top:4px">Each stage becomes visible to all once its deadline has passed. Your own picks are always visible.</p></div>';
  if(!keys.length){ el.innerHTML=html+'<div class="empty">No players yet.</div>'; return; }
  keys.sort(function(a,b){ return (state.players[a].display||a).localeCompare(state.players[b].display||b); });
  html+='<div>';
  keys.forEach(function(k){
    var p=state.players[k]; var isMe=(k===state.user);
    var open=openPlayers[k]||isMe;
    html+='<div class="predplayer"><div class="ph" data-pl="'+esc(k)+'"><div class="nm">'+esc(p.display||k)+(isMe?' <span class="dim">(you)</span>':'')+'</div>'
        +'<div class="tot" style="font-family:\'Bebas Neue\';font-size:22px;color:var(--gold)">'+totalPoints(k)+'</div>'
        +'<div class="chev">'+(open?'▾':'▸')+'</div></div>';
    if(open){ html+='<div class="predbody">'+predBodyFor(k,isMe)+'</div>'; }
    html+='</div>';
  });
  html+='</div>';
  el.innerHTML=html;
  Array.prototype.forEach.call(el.querySelectorAll('[data-pl]'),function(n){
    n.onclick=function(){ var k=n.getAttribute('data-pl'); openPlayers[k]=!(openPlayers[k]||(k===state.user)); renderPredictions(); };
  });
}
function predBodyFor(key,isMe){
  var p=playerObj(key); var h='';
  STAGES.forEach(function(s){
    var visible = isMe || isLocked(s.key);
    h+='<div class="predstage"><div class="psh">'+esc(s.name)+'</div>';
    if(!visible){ h+='<div class="lockmsg">🔒 Hidden until deadline passes</div></div>'; return; }
    if(s.key==="champion"){
      if(!p.champion){ h+='<div class="lockmsg">No pick</div>'; }
      else {
        var rw=(state.results.ko.final&&state.results.ko.final["0"]);
        var ok=rw&&p.champion===rw;
        h+='<div class="chips"><span class="chip'+(ok?' correct':'')+'">'+esc(p.champion)+'</span></div>';
      }
    } else if(s.key==="group"){
      var rs={}; (state.results.group||[]).forEach(function(n){rs[n]=1;});
      if(!p.group||!p.group.length){ h+='<div class="lockmsg">No picks</div>'; }
      else {
        h+='<div class="chips">'+p.group.slice().sort().map(function(n){
          return '<span class="chip'+(rs[n]?' correct':'')+'">'+esc(n)+'</span>';
        }).join('')+'</div>';
      }
    } else {
      var picks=(p.ko&&p.ko[s.key])||{};
      var res=(state.results.ko&&state.results.ko[s.key])||{};
      var arr=Object.keys(picks);
      if(!arr.length){ h+='<div class="lockmsg">No picks</div>'; }
      else {
        h+='<div class="chips">'+arr.sort(function(a,b){return a-b;}).map(function(mi){
          var ok=res[mi]&&res[mi]===picks[mi];
          return '<span class="chip'+(ok?' correct':'')+'">'+esc(picks[mi])+'</span>';
        }).join('')+'</div>';
      }
    }
    h+='</div>';
  });
  return h;
}

var adminOpen={};
function renderAdmin(){
  var el=byId('page-admin');

function adminSection(id,title){
  var open=adminOpen[id];
  return '<div class="adminsec"><div class="ah" data-asec="'+id+'">'+title+'<span>'+(open?'▾':'▸')+'</span></div>'
    +(open?'<div class="ab" id="ab-'+id+'">'+adminBody(id)+'</div>':'')+'</div>';
}
function adminBody(id){
  if(id==="results") return adminGroupResults();
  if(id==="bracket") return adminBracket();
  if(id==="koresults") return adminKOResults();
  if(id==="override") return adminOverride();
  if(id==="tracker") return adminTracker();
  if(id==="locks") return adminLocks();
  if(id==="danger") return adminDanger();
  return '';
}

function teamDatalist(){

/* KO results entry */
function adminKOResults(){

/* submission tracker */

    h+='<div class="divider"></div><b>'+esc(s.name)+'</b><div class="statusgrid">';

  });

function adminDanger(){

    +'<button class="btn danger" id="resetAll" style="margin-top:10px">Reset ALL '+MODE.toUpperCase()+' data</button>';
}

function wireAdmin(){
  Array.prototype.forEach.call(document.querySelectorAll('[data-asec]'),function(n){
    n.onclick=function(){ var id=n.getAttribute('data-asec'); adminOpen[id]=!adminOpen[id]; renderAdmin(); };
  });
  // group qualifiers
  Array.prototype.forEach.call(document.querySelectorAll('[data-qual]'),function(n){
    n.onclick=function(){
      var t=n.getAttribute('data-qual'); var i=draftQual.indexOf(t);
      if(i>=0) draftQual.splice(i,1);
      else { if(draftQual.length>=32){toast('Already 32 selected',true);return;} draftQual.push(t); }
      n.classList.toggle('sel'); n.querySelector('.chk').textContent=draftQual.indexOf(t)>=0?'✓':'';
      var c=byId('qualCount'); if(c)c.textContent=draftQual.length+'/32';
    };
  });
  var sq=byId('saveQual'); if(sq) sq.onclick=function(){
    if(draftQual.length!==32){ toast('Select exactly 32 qualifiers',true); return; }
    ref("results/group").set(draftQual).then(function(){toast('Group results saved');});
  };
  // bracket inputs
  Array.prototype.forEach.call(document.querySelectorAll('[data-savebrk]'),function(b){
    b.onclick=function(){ saveBracketDraft(b.getAttribute('data-savebrk'),false); };
  });
  Array.prototype.forEach.call(document.querySelectorAll('[data-confirmbrk]'),function(b){
    b.onclick=function(){ saveBracketDraft(b.getAttribute('data-confirmbrk'),true); };
  });
  Array.prototype.forEach.call(document.querySelectorAll('[data-autobrk]'),function(b){
    b.onclick=function(){ autoFillBracket(b.getAttribute('data-autobrk')); };
  });
  // KO results
  Array.prototype.forEach.call(document.querySelectorAll('[data-kores]'),function(b){
    b.onclick=function(){
      var key=b.getAttribute('data-kores'), mi=b.getAttribute('data-mi'), team=b.getAttribute('data-team');
      ref("results/ko/"+key+"/"+mi).set(team).then(function(){toast('Winner recorded');});
    };
  });
  // override
  var ov=byId('ovSave'); if(ov){
    function showCur(){
      var pk=byId('ovPlayer').value, sk=byId('ovStage').value;
      var cur=overrideFor(playerObj(pk),sk);
      byId('ovCurrent').textContent='Current override for this stage: '+cur+' pts';
    }
    byId('ovPlayer').onchange=showCur; byId('ovStage').onchange=showCur; showCur();
    ov.onclick=function(){
      var pk=byId('ovPlayer').value, sk=byId('ovStage').value, v=parseInt(byId('ovVal').value||'0',10);
      var cur=overrideFor(playerObj(pk),sk);
      ref("players/"+pk+"/override/"+sk).set(cur+v).then(function(){toast('Override applied');});
    };
  }
  // locks
  Array.prototype.forEach.call(document.querySelectorAll('[data-lock]'),function(b){
    b.onclick=function(){
      var key=b.getAttribute('data-lock'), v=b.getAttribute('data-v');
      if(MODE==="trial"){ ref("locks/"+key).set(v==="1"); }
      else { if(v==="auto") ref("locks/"+key).remove(); else ref("locks/"+key).set(v); }
      toast('Stage status updated');
    };
  });
  // reset
  var ra=byId('resetAll'); if(ra) ra.onclick=function(){
    showModal('Reset all '+MODE+' data?','This erases every player, pick, result and bracket. This cannot be undone.',
      'Yes, erase everything', function(){
        ref("").remove().then(function(){ toast('All data reset'); });
      });
  };
}
function saveBracketDraft(key,confirm){
  var st=STAGES.filter(function(s){return s.key===key;})[0];
  var matches=[];
  for(var i=0;i<st.matches;i++){
    var a=document.querySelector('[data-brk="'+key+'"][data-mi="'+i+'"][data-side="0"]');
    var bb=document.querySelector('[data-brk="'+key+'"][data-mi="'+i+'"][data-side="1"]');
    matches.push([a?a.value.trim():"", bb?bb.value.trim():""]);
  }
  if(confirm){
    // validate filled
    for(var j=0;j<matches.length;j++){ if(!matches[j][0]||!matches[j][1]){ toast('Fill both teams in every match before confirming',true); return; } }
  }
  ref("bracket/"+key).set({matches:matches, confirmed:!!confirm}).then(function(){
    toast(confirm?(st.short+' bracket published'):'Draft saved');
  });
}
function autoFillBracket(key){
  // fill from previous round winners (results.ko of previous stage), pairing sequentially
  var idx=KO_KEYS.indexOf(key);
  if(idx<=0){ toast('No previous round',true); return; }
  var prev=KO_KEYS[idx-1];
  // special: final & third both come from SF. third = SF losers, final = SF winners.
  var st=STAGES.filter(function(s){return s.key===key;})[0];
  var matches=[];
  if(key==="final" || key==="third"){
    var sfB=state.bracket["sf"]; var sfR=(state.results.ko["sf"])||{};
    if(!sfB||!sfB.matches||sfB.matches.length<2){ toast('Set & score Semi-Finals first',true); return; }
    var winners=[], losers=[];
    sfB.matches.forEach(function(m,i){
      var w=sfR[i]; if(!w){ return; }
      var l=(m[0]===w)?m[1]:m[0];
      winners.push(w); losers.push(l);
    });
    if(key==="final"){ if(winners.length<2){toast('Score both semi-finals first',true);return;} matches=[[winners[0],winners[1]]]; }
    else { if(losers.length<2){toast('Score both semi-finals first',true);return;} matches=[[losers[0],losers[1]]]; }
  } else {
    var prevRes=(state.results.ko[prev])||{};
    var winners2=[];
    var prevB=state.bracket[prev];
    if(!prevB||!prevB.matches){ toast('Previous bracket missing',true); return; }
    for(var i=0;i<prevB.matches.length;i++){ if(prevRes[i]) winners2.push(prevRes[i]); }
    if(winners2.length<prevB.matches.length){ toast('Score all '+prev.toUpperCase()+' matches first',true); return; }
    for(var k=0;k<winners2.length;k+=2){ matches.push([winners2[k], winners2[k+1]||""]); }
  }
  ref("bracket/"+key).set({matches:matches,confirmed:false}).then(function(){
    toast('Auto-filled '+st.short+' — review then confirm'); renderAdmin();
  });
}

/* ===================== MODAL ===================== */
function showModal(title,body,confirmLabel,onConfirm){
  var root=byId('modalRoot');
  root.innerHTML='<div class="modal-bg"><div class="modal"><h3>'+esc(title)+'</h3><p class="muted">'+esc(body)+'</p>'
    +'<div class="acts"><button class="btn secondary" id="mCancel">Cancel</button><button class="btn danger" id="mOk">'+esc(confirmLabel)+'</button></div></div></div>';
  byId('mCancel').onclick=function(){ root.innerHTML=''; };
  byId('mOk').onclick=function(){ root.innerHTML=''; onConfirm(); };
}

/* ===================== AUTH / NAV ===================== */
function doLogin(name){
  var disp=name.trim();
  if(!disp){ toast('Enter your name',true); return; }
  state.user=nkey(disp); state.displayName=disp; state.isAdmin=false; state.page="home";
  // register/refresh profile
  ref("players/"+state.user+"/display").set(disp);
  showApp();
}
function doAdmin(pin){
  if(pin!==ADMIN_PIN){ toast('Wrong PIN',true); return; }
  state.isAdmin=true; state.user="__admin__"; state.displayName=null; state.page="admin";
  showApp();
}
function showApp(){
  byId('loginView').classList.add('hidden');
  byId('appView').classList.remove('hidden');
  if(!state._bound){ bindData(); state._bound=true; }
  render();
}
function logout(){
  state.user=null; state.displayName=null; state.isAdmin=false; currentStage=null; state.page="home";
  byId('appView').classList.add('hidden');
  byId('loginView').classList.remove('hidden');
  byId('nameInput').value=''; var pin=byId('pinInput'); if(pin)pin.value='';
}

/* wire login screen */
byId('enterBtn').onclick=function(){ doLogin(byId('nameInput').value); };
byId('nameInput').addEventListener('keydown',function(e){ if(e.key==='Enter') doLogin(this.value); });
byId('adminToggle').onclick=function(){ byId('adminLogin').classList.toggle('hidden'); };
byId('adminEnterBtn').onclick=function(){ doAdmin(byId('pinInput').value); };
byId('pinInput')&&byId('pinInput').addEventListener('keydown',function(e){ if(e.key==='Enter') doAdmin(this.value); });
byId('logoutBtn').onclick=logout;
Array.prototype.forEach.call(document.querySelectorAll('#tabbar button'),function(b){
  b.onclick=function(){ state.page=b.getAttribute('data-page'); if(state.page!=="picks") currentStage=null; render(); };
});

/* boot */
if(!db){ document.body.innerHTML='<div style="padding:40px;text-align:center;color:#fb7185;font-family:sans-serif">Could not connect to Firebase. Check your internet connection and reload.</div>'; }
</script>
