<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FIFA World Cup 2026 — Predictions</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: linear-gradient(160deg, #0a1733, #0e2350);
      font-family: "Trebuchet MS", "Segoe UI", Roboto, sans-serif;
      color: #f5f7fb;
      display: flex; align-items: center; justify-content: center;
    }
    .card {
      max-width: 420px; width: 90%;
      background: #13294f; border: 1px solid #27406f;
      border-radius: 18px; padding: 36px 28px; text-align: center;
    }
    .trophy { font-size: 56px; margin-bottom: 12px; }
    h1 { font-size: 22px; font-weight: 900; margin-bottom: 4px; }
    h1 span { color: #f4c430; }
    .sub { font-size: 12px; color: #9db0d6; letter-spacing: 1px; margin-bottom: 32px; }
    .btn {
      display: block; width: 100%; padding: 15px;
      border-radius: 12px; font-size: 16px; font-weight: 800;
      text-decoration: none; margin-bottom: 12px;
      font-family: inherit; transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-live { background: #e63946; color: #fff; }
    .btn-trial {
      background: transparent; color: #9db0d6;
      border: 1px solid #27406f; font-size: 13px; padding: 11px;
    }
    .note { font-size: 11px; color: #9db0d6; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="trophy">🏆</div>
    <h1>WORLD CUP <span>2026</span></h1>
    <p class="sub">USA · CANADA · MEXICO · PREDICTION GAME</p>

    <a href="live.html" class="btn btn-live">Enter the Live Game</a>
    <a href="trial.html" class="btn btn-trial">Trial / Test Version</a>

    <p class="note">
      Enter your name to play. No password needed.<br>
      Admin access via the Admin tab (PIN required).
    </p>
  </div>
</body>
</html>
